name: Check test vectors

on: pull_request

permissions:
  contents: read

jobs:
  verify:
    name: Verify test vectors
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Regenerate test vectors
        run: ./regenerate.sh all all

      - name: Verify there are no changes
        run: git diff; git ls-files --others --exclude-standard; test -z "$(git status --porcelain)"

      - name: Verify Rust test vectors compile
        run: |
          tmpdir=$(mktemp -d)
          for f in test-vectors/rust/*.rs; do
            echo "Compiling $f"
            printf '#![allow(dead_code)]\n' | cat - "$f" \
              | rustc --edition 2021 --crate-type lib - -o "$tmpdir/out"
          done
          rm -rf "$tmpdir"
